name = "lifelongpep-lead-api"
main = "src/index.js"
compatibility_date = "2026-06-17"

routes = [
  { pattern = "api.lifelongpep.fit/*", zone_name = "lifelongpep.fit" }
]

[vars]
PUBLIC_LEAD_RATE_LIMIT = "12"
PUBLIC_LEAD_RATE_WINDOW_SECONDS = "3600"
# Set to "true" only for local debugging.
DISABLE_RATE_LIMIT = "false"

# Replace this placeholder after running:
# wrangler d1 create lifelongpep_leads
[[d1_databases]]
binding = "DB"
database_name = "lifelongpep_leads"
database_id = "49984ea9-9b34-4ea0-8b8b-e409dcc30a8e"

# Required secrets:
# wrangler secret put ADMIN_TOKEN
# wrangler secret put IP_HASH_SALT
#
# Optional notification secrets:
# wrangler secret put RESEND_API_KEY
# wrangler secret put NOTIFY_TO_EMAIL
# wrangler secret put NOTIFY_FROM_EMAIL
